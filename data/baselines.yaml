# Canonical current-best baselines — maintained BY HAND (no auto-promote; run.py only writes
# immutable per-run history under data/results/). Copy here only the numbers you trust, with
# enough provenance to reproduce them. `single` is the reference; `framework` is the
# parallel_consensus orchestrator. A pair is comparable only within one dataset's `ids_hash`.

inference:
  provider: groq
  model: openai/gpt-oss-20b
  params: { temperature: 1.0, top_p: 1.0, reasoning_effort: medium, max_completion_tokens: 8192 }

v0.0.2:
  date: 2026-06-22
  code_version: eeb7b1e-dirty   # harness: run.py --defer-judge + Sonnet judge (judge.py), pre-commit
  framework: "parallel_consensus · group A (Minimal Trident: Evidentialist/Rationalist/Pragmatist) · max_rounds 3"
  sample: { scheme: all, seed: 7 }   # full datasets
  repeats: 1                          # no error bars yet — variance under temp=1.0 deferred to v0.0.3
  truthfulqa_judge: claude-sonnet-4-6  # independent judge, decoupled from generation (a model must not grade itself)

  # single vs framework, paired McNemar (exact binomial). All three significant (p < 0.05).
  results:
    math500:
      n: 500
      ids_hash: ab55bc299b7c
      single: 0.926
      framework_A: 0.956
      delta: +0.030
      mcnemar: { p: 0.0107, fixed: 23, broke: 8 }
    gpqa_diamond:
      n: 198
      ids_hash: 8b527dfc2bd0
      single: 0.611
      framework_A: 0.707
      delta: +0.096
      mcnemar: { p: 0.0054, fixed: 31, broke: 12 }
    truthfulqa:
      n: 817
      ids_hash: f30b776a3988
      single: 0.696
      framework_A: 0.763
      delta: +0.067
      mcnemar: { p: 0.0001, fixed: 122, broke: 68 }

  notes: >
    First full-dataset baseline on Groq gpt-oss-20b. The framework beats single on all three
    benchmarks, all significant. Largest gain on gpqa_diamond (+9.6pp) — hard reasoning benefits
    most from debate; smallest on math500 (+3.0pp) where single is already near ceiling.
    TruthfulQA shows high churn (122 fixed / 68 broke): the framework rewrites many answers,
    net positive but noisy. repeats=1 means run-to-run variance is unquantified; a multi-repeat
    mean±std and new orchestrators land together in v0.0.3.

v0.0.3:
  date: 2026-06-22
  code_version: aae2889   # tool orchestrator + tool-agnostic prompt; pre rate-governor commit
  framework: "parallel_consensus · group A · max_rounds 3 (still the current best)"
  sample: { scheme: all, seed: 7 }
  repeats: 1

  # New orchestrator under test: tool_grounded_verification — parallel_consensus whose specialists
  # may call a sandboxed run_python (pydantic-monty) to ground a numeric/derivable answer. Plus
  # tool_single (single + the same tool loop) so the 3-way holds tools equal. NEGATIVE RESULT.
  results:
    math500:
      n: 500
      ids_hash: ab55bc299b7c
      single: 0.936
      tool_single: 0.946           # +1.0 vs single, but 14 fixed / 9 broke, p=0.40 (n.s.)
      framework_A: 0.968           # parallel_consensus; 18 fixed / 2 broke vs single, p=0.0004
      tool_grounded_A: 0.960       # tool framework
      mcnemar:
        single_vs_framework:          { p: 0.0004, fixed: 18, broke: 2 }  # debate works (reproduces v0.0.2)
        framework_vs_tool_grounded:   { p: 0.2188, fixed: 1,  broke: 5 }  # HEADLINE: tool ON the framework — negative
        tool_single_vs_tool_grounded: { p: 0.1892, fixed: 14, broke: 7 }  # framework effect, tools held equal

  notes: >
    tool_grounded_verification does NOT beat parallel_consensus on math500: the headline contrast
    (tool framework vs no-tool framework) is 1 fixed / 5 broke — directionally NEGATIVE, not
    significant. The adoption criterion (beat BOTH the no-tool framework AND the tool-equipped
    single, significantly) fails. WHY: parallel_consensus is already ~96.8% (near ceiling) and
    debate ALREADY fixes the arithmetic-slip false-consensus the tool targeted, so the tool is
    redundant here and only adds risk (over-trust on a mis-modeled problem, tool-loop distraction).
    The tool IS a real math lever — it helped single +1.0 where there's headroom, and on
    gpqa_diamond it HURT (conceptual MC, wrong error type). Consistent with the grok research's
    near-ceiling prediction (GPQA multi-agent was only +1.4). Next: a harder math set (AIME) where
    debate alone can't reach ceiling. Orchestrator kept (variants are never deleted); the negative
    result is the deliverable. Shipped alongside: client-side rate governor (ThrottledClient,
    OPENAI_RPM/TPM) + per-question failure isolation, after the token-heavy tool arm crashed a full
    run on a 429.

v0.0.4:
  date: 2026-06-26
  code_version: 3a84159   # scripts/benchmarks/sweep.py (local-roster effort profile driver)
  kind: single-model effort×dataset PROFILE (not a framework comparison) — the groundwork bars the
        heterogeneous framework must beat. Each cell is --system single on local Ollama.
  inference:
    provider: ollama
    params: { max_completion_tokens: 32768 }   # per-model temperature/top_p pinned (see .env.example)
  sample: { scheme: stratified, seed: 0 }       # aime n=90 (full), gpqa n=100, math500 n=100
  repeats: 1

  # acc per (model, effort); `trunc` = answers cut off at 32k (finish_reason=length) — a Law 14
  # cost/validity flag: a high-trunc cell is NOT a clean capability number. mistral has no reasoning
  # channel (effort N/A, rejects the param); gpt-oss IGNORES effort=none (still reasons).
  profile:
    aime:        # n=90
      gpt-oss:20b:          { none: 0.722, none_trunc: 19, low: 0.433, medium: 0.711, medium_trunc: 7 }
      nemotron-3-nano:30b:  { none: 0.044, low: 0.500, low_trunc: 44, medium: 0.544, medium_trunc: 41 }
      qwen3.6:35b:          { none: 0.744, low: 0.478, low_trunc: 47, medium: 0.478, medium_trunc: 47 }
      mistral-small3.2:     { none: 0.244 }   # no-reasoning chat model
    gpqa_diamond:  # n=100
      gpt-oss:20b:          { none: 0.680, low: 0.500, medium: 0.720 }
      nemotron-3-nano:30b:  { none: 0.370, low: 0.430, low_trunc: 39, medium: 0.420, medium_trunc: 38 }
      qwen3.6:35b:          { none: 0.740, low: 0.760, low_trunc: 7, medium: 0.750, medium_trunc: 6 }
      mistral-small3.2:     { none: 0.500 }
    math500:  # n=100
      gpt-oss:20b:          { none: 0.970, low: 0.900, medium: 0.950 }
      nemotron-3-nano:30b:  { none: 0.510, low: 0.960, medium: 0.960 }
      qwen3.6:35b:          { none: 0.980, low: 0.990, medium: 0.950, medium_trunc: 4 }
      mistral-small3.2:     { none: 0.870 }

  # The single-model bar the framework must beat, per dataset (strongest model @ its best effort):
  bars:
    aime:         { model: qwen3.6:35b, effort: none, acc: 0.744 }
    gpqa_diamond: { model: qwen3.6:35b, effort: low,  acc: 0.760 }
    math500:      { model: qwen3.6:35b, effort: low,  acc: 0.990 }   # saturated

  notes: >
    Local 4-model × 3-dataset × {none,low,medium} effort profile (~71h wall-clock). qwen3.6 is the
    strongest single model on ALL three datasets — the roster anchor. HEADLINE (Law 14): turning
    reasoning ON self-truncates at 32k on hard sets — qwen aime low/medium = 47/90 answers cut off
    (52%), collapsing it to 47.8% vs none's 74.4%; nemotron aime/gpqa low/medium ~40% truncated.
    So `none` (the model reasoning in the content channel, no truncation) often WINS on hard sets,
    empirically validating "specialists argue in content anyway, why max internal reasoning."
    Effort sweet spot is PER-MODEL (qwen→none, gpt-oss→none/medium, nemotron→medium-but-weak,
    mistral fixed) — pin each via OPENAI_PROVIDERS. high effort excluded (dominated: more truncation
    for fewer points). math500 saturated (0.95–0.99). nemotron-3-nano is the weakest member and most
    truncation-prone (drop-or-medium candidate). Next: heterogeneous_consensus with each provider at
    its sweet spot, token-budget-matched vs the qwen bar.
